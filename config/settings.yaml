# Main application settings. Everything here is operator-editable.

monitor:
  # How often `run.py monitor --loop` polls channels, in minutes. The GitHub
  # Actions monitor workflow has its own 6-hour cron (see
  # .github/workflows/monitor.yml); this value only drives local loop mode.
  poll_interval_minutes: 360
  # Default monitor window by publish date: number of calendar days to scan,
  # counting today (2 = today + yesterday). Also the dashboard's default date
  # filter. Override a single run with the "look back" box on the dashboard.
  default_lookback_days: 2
  # Max uploads fetched per channel per poll (safety cap; local news volume is low).
  max_results_per_channel: 25
  # Skip portrait/vertical videos (YouTube Shorts) — they don't fit the clip workflow.
  exclude_portrait: true

matching:
  # LLM relevance score is 0.0-1.0. Candidates below this are hidden by default
  # in the review dashboard (still stored, still viewable with "show hidden").
  score_threshold: 0.5
  # LLM model used for relevance scoring (Anthropic model ID).
  model: claude-haiku-4-5

vision:
  # Optionally tag candidates from YouTube storyboard stills (metadata-only —
  # nothing downloaded). Neutral labels only; no visual "punch" score. Ranking
  # uses climate relevance (+ ACTIVE learned trait verdicts once unlocked).
  # Ground-truth learning tags come from the published clip file, not this.
  enabled: true
  model: claude-haiku-4-5
  # Tag during the monitor pass so triage can show trait badges early.
  # Only candidates at/above min_relevance are tagged.
  score_at_monitor: true
  min_relevance: 0.5
  max_per_run: 40
  max_sheets: 4
  # Flat trait vocabulary (seeded into the Traits page on first run; page edits
  # take precedence). Observation only — performance decides good/bad later.
  traits:
    - action
    - people_doing_things
    - fire
    - flood
    - storm_damage
    - destruction
    - rescue_or_emergency_response
    - crowd
    - dramatic_weather
    - aerial_or_sweeping_shot
    - talking_head_or_anchor_at_desk
    - static_graphic_or_slideshow
    - chart_or_data_screen
    - text_heavy_lower_thirds
    - press_conference_podium
    - low_motion_studio_segment
  # Frames extracted from each PUBLISHED clip for ground-truth trait annotation.
  post_frames: 12

ranking:
  # Queue order: climate relevance, optionally nudged by ACTIVE trait verdicts
  # (see `learning:`). Visual scores are retired.
  relevance_weight: 1.0
  # How far an ACTIVE trait verdict can move a candidate's score (0 = ignore).
  trait_influence: 0.3

learning:
  # The trait self-improvement loop. Traits are annotated on every published
  # post unconditionally (collect-first), but verdicts only start influencing
  # ranking once BOTH gates are met — so a few lucky posts can't steer the tool.
  # Gate 1: total published posts with metrics before ANY verdict activates
  # (the account baseline needs this much data to be meaningful).
  min_total_posts: 100
  # Gate 2: times a specific trait must be observed before its verdict activates.
  min_trait_posts: 20
  # Traits at >= this fraction of the per-trait gate show as "provisional" on
  # the Traits page (display only, still no influence).
  provisional_fraction: 0.5
  # Compare every post's performance at the same age (hours after publish),
  # interpolated from metric snapshots — otherwise old posts always "win".
  metric_age_hours: 48
  # Recency decay half-life for the rolling baseline and per-trait medians, so
  # verdicts drift with the audience instead of fossilizing early conclusions.
  halflife_days: 90

voice:
  # Match caption suggestions to the operator's own writing voice: past
  # captions (hand-written and operator-edited ones weighted highest) are fed
  # to the drafting model as few-shot examples plus a distilled style guide.
  enabled: true
  # Captions needed before voice matching kicks in (below this, generic style).
  min_captions: 3
  # How many example captions to include with each suggestion request.
  examples: 8
  # Rebuild the cached style guide after this many new published captions.
  refresh_every: 5
  # Model used to distill the style guide (cheap; runs rarely).
  model: claude-sonnet-5

llm:
  # Budget guardrail. Total Anthropic spend per day (UTC) is tracked in
  # data/llm_spend.json; vision scoring stops for the day once this is hit
  # (relevance scoring and the digest are cheap and always run).
  daily_budget_usd: 3.0
  # Approximate prices in USD per 1,000,000 tokens, used only to estimate spend
  # for the budget guardrail. Update if Anthropic's pricing changes.
  pricing:
    claude-haiku-4-5:
      input: 1.0
      output: 5.0
    claude-sonnet-5:
      input: 3.0
      output: 15.0
    default:
      input: 3.0
      output: 15.0

storage:
  # Local disk root for full downloaded segments, organized channel/date under it.
  download_dir: data/videos
  # Where transcripts are written (also stored in the DB).
  transcript_dir: data/transcripts
  # Retention for full segments: "keep" (default, never delete) or an integer
  # number of days after which the CLEANUP COMMAND (never automatic) may prune.
  retention: keep
  # Optional redundancy: also copy full segments to a PRIVATE Supabase bucket.
  # Off by default by design (keep raw segments local).
  backup_full_segments_to_cloud: false
  # Supabase Storage bucket for trimmed clips (public URL needed by Threads).
  trimmed_clip_bucket: trimmed-clips
  # Seconds a signed clip URL stays valid; must outlive Meta's fetch+processing
  # window. 1 hour is comfortable.
  signed_url_ttl_seconds: 3600

scrape:
  # Politeness delays between any two yt-dlp operations (seconds, randomized range).
  delay_min_seconds: 8
  delay_max_seconds: 25
  # yt-dlp format selection for the full segment.
  ytdlp_format: "bv*[height<=1080]+ba/b[height<=1080]"

threads:
  # Threads user id is discovered automatically after OAuth; leave blank.
  user_id: ""
  # How long to wait for Meta to finish processing an uploaded video before
  # giving up (seconds). Larger clips take longer; bump this if posts time out.
  publish_poll_timeout_seconds: 600
  # How often to poll the media container's processing status (seconds).
  publish_poll_interval_seconds: 10

engagement:
  # HARD SCOPE LIMIT. The tool only ever reads/replies on the operator's own
  # posts. This flag exists but is HIGH-RISK and should stay false: enabling it
  # is documented as against the design intent and platform-risk posture.
  allow_other_users_posts: false
  # Comment classification categories (LLM must pick exactly one).
  categories:
    - supportive
    - genuine_question
    - neutral
    - hostile_or_argumentative
    - bait_or_trolling
    - spam_or_bot
    - off_topic
  # Only these categories become reply candidates. Everything else is logged
  # but never gets a drafted promo reply.
  reply_eligible_categories:
    - supportive
    - genuine_question
  # Pacing guardrails for approved replies (enforced at post time).
  # Note: these are OUR caps, not Threads'. Threads/Meta enforce their own
  # separate API rate limits (~250 posts+replies per 24h per user).
  max_replies_per_hour: 100
  max_replies_per_day: 250
  # Don't draft replies for more than this fraction of eligible comments on a
  # single post (avoid replying to literally everyone).
  max_reply_fraction_per_post: 0.5
  # LLM models (Anthropic model IDs).
  classify_model: claude-haiku-4-5
  draft_model: claude-sonnet-5
  # Context the LLM uses when drafting replies. Edit to taste.
  reply_guidance: >
    Write the reply in TWO parts, separated by a blank line.

    PART 1 - Respond to the commenter first: one short, warm, genuine sentence
    that speaks to their specific point (agree, empathize, or answer their
    question). Vary this opener every time so replies never look copy-pasted;
    for a brief affirming comment a single word like "Agreed." or "Seconded."
    is fine.

    PART 2 - Then pitch Renewables.org using this text, kept essentially intact
    (you may lightly trim to fit, but keep every fact: the $25 minimum, Global
    South solar, getting paid back, earning no interest rate, and creating 550%
    more carbon avoidance than the Global North):
    "Nonprofit Renewables.org allows anyone to invest as little as $25 in Global
    South solar and get paid back as they generate and sell clean electricity to
    the grid. You don't earn an interest rate, but dollar-for-dollar, you'll
    create 550% more carbon avoidance than you would have investing in the
    Global North."

    Always include the word "Renewables.org" verbatim so it links. Never be
    pushy or argumentative. Keep the whole reply under 500 characters.

scheduler:
  # Adaptive posting: publish the FIFO queue at fixed ET windows, deferring when
  # the most-recent post is still "hot." Disable to pause automatic publishing.
  enabled: true
  # All window times are interpreted in this zone (DST handled automatically).
  timezone: America/New_York
  # Active hours in the scheduler timezone (24h HH:MM). Outside this range the
  # scheduler never publishes (breaking override still respects the spacing floor).
  active_hours_start: "08:00"
  active_hours_end: "22:00"
  # Daily posting windows (local to timezone above). Tune later against insights.
  windows:
    - "10:00"
    - "14:30"
    - "19:00"
  # Never publish two posts less than this many minutes apart (any path).
  spacing_floor_minutes: 90
  # Cap consecutive hot-deferrals for the queue head; after this, publish anyway.
  max_deferrals: 2
  # "Hot" = last published post gained more than ``threshold`` of ``metric``
  # over the trailing ``window_minutes`` (computed from MetricSnapshot deltas).
  hot:
    metric: likes
    window_minutes: 60
    threshold: 100
  # How often to re-pull insights for recently published posts (feeds hotness).
  metrics_poll_interval_minutes: 15
  # Only poll posts published within this many hours for the hotness signal.
  metrics_poll_recency_hours: 6

subtitles:
  # Stylized burned-in captions for exported clips (optional, per clip from the
  # Post step). The "talks Renewables.org" look: big lowercase Funnel words, a
  # few at a time, with the word being spoken set on a solid rounded box in
  # inverted colors.
  # Words shown on screen at once (fewer = bigger, more kinetic).
  max_words_per_group: 3
  # Bundled Funnel weights: FunnelDisplay-SemiBold.ttf / -Bold.ttf / -ExtraBold.ttf
  font_file: FunnelDisplay-SemiBold.ttf
  # Render captions in ALL CAPS (the reference series uses lowercase).
  uppercase: false
  # Base word color, the highlight box fill, and the word color inside the box
  # (defaults sampled from the talks Renewables.org series: navy #1A4A7D).
  text_color: "#FFFFFF"
  highlight_box_color: "#FFFFFF"
  highlight_text_color: "#1A4A7D"
  # Caption size as a fraction of video height (0.11 ≈ 120px at 1080p).
  font_size_frac: 0.11
  # Where captions sit on the frame: "bottom" (default) or "top".
  position: bottom
  # After the last word of a phrase, keep that caption on screen this many
  # seconds (or until the next phrase starts, whichever comes first). Stops
  # captions from vanishing the instant speech pauses.
  dwell_seconds: 2.0

analytics:
  # How often the metrics puller re-snapshots each post's stats (hours).
  snapshot_interval_hours: 12
  # Stop re-pulling metrics for posts older than this many days.
  max_post_age_days: 60
  # Model used for the written digest (Anthropic model ID).
  digest_model: claude-sonnet-5
  # Minimum posts before the digest is allowed to claim any pattern.
  min_sample_size: 8
