# Channel seed list: top-50 US market local TV news YouTube channels.
# One entry per YouTube channel. Shared newsrooms that post to a single channel
# (First Coast News, Action News Jax, KCAL/KCBS, Arizona's Family) appear once,
# which is what deduplicates them. KDNL (St. Louis ABC) is omitted: no local
# newscast / no channel.
#
# Fields:
#   call_sign: station call sign(s)
#   network:   network affiliation
#   market:    Nielsen market name
#   region:    coarse region tag used by analytics (editable)
#   url:       YouTube channel URL (handle, /channel/, /c/, or /user/ form)
#   channel_id: canonical UC... id. Leave blank; the app resolves and caches it.
#   enabled:   set false to pause a channel without deleting it.
#
# You can edit this file by hand or use the Channels page in the dashboard.

