name: Channel monitor

# Runs one discovery pass (poll channels -> keyword filter -> LLM relevance ->
# vision score -> store candidates in Postgres) every 6 hours, so new
# candidates are waiting in the dashboard even when the operator's machine is
# off. Safe to overlap with a manual dashboard run: video ids are unique, so
# re-listed uploads are skipped before any LLM spend.
#
# UTC crons below ≈ 6am / noon / 6pm / midnight ET during EDT.
on:
  schedule:
    - cron: "0 4,10,16,22 * * *"
  workflow_dispatch: {}

concurrency:
  group: channel-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-scheduler.txt
      # Scheduler deps + yt-dlp (used only for storyboard metadata during
      # vision scoring; a bot-check failure there just skips the visual score).
      - run: pip install -r requirements-scheduler.txt yt-dlp
      - name: Run one monitor pass
        run: python run.py monitor
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
