<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Climate Clip Monitor</title>
<script>
  // Apply saved theme before first paint to avoid a flash.
  (function () {
    try {
      var t = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    } catch (e) { document.documentElement.setAttribute('data-theme', 'dark'); }
  })();
  function toggleTheme() {
    var cur = document.documentElement.getAttribute('data-theme') === 'light' ? 'light' : 'dark';
    var next = cur === 'light' ? 'dark' : 'light';
    document.documentElement.setAttribute('data-theme', next);
    try { localStorage.setItem('theme', next); } catch (e) {}
    var lbl = document.getElementById('theme-label');
    if (lbl) lbl.textContent = next === 'light' ? 'Dark mode' : 'Light mode';
  }
</script>
<link rel="stylesheet" href="/static/style.css?v={{ static_v }}">
</head>
<body>
<aside class="sidebar">
  <div class="brand">
    <div class="logo">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2a10 10 0 1 0 10 10"/><path d="M12 6v6l4 2"/>
      </svg>
    </div>
    <div class="name">Climate Clip<small>Monitor &amp; Poster</small></div>
  </div>

  <div class="nav-section">Workflow</div>
  <a class="nav {{ 'active' if active == 'dashboard' }}" href="/">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>
    <span class="label">Dashboard</span>
  </a>
  <a class="nav {{ 'active' if active == 'archive' }}" href="/archive">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8v13H3V8"/><path d="M1 3h22v5H1z"/><path d="M10 12h4"/></svg>
    <span class="label">Archive</span>
  </a>
  <a class="nav {{ 'active' if active == 'posts' }}" href="/posts">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13"/><path d="M22 2 15 22l-4-9-9-4 20-7z"/></svg>
    <span class="label">Posts</span>
  </a>
  <a class="nav {{ 'active' if active == 'calendar' }}" href="/calendar">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
    <span class="label">Calendar</span>
  </a>
  <a class="nav {{ 'active' if active == 'engagement' }}" href="/engagement">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    <span class="label">Replies</span>
  </a>
  <a class="nav {{ 'active' if active == 'analytics' }}" href="/analytics">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 15l4-6 4 3 5-8"/></svg>
    <span class="label">Analytics</span>
  </a>

  <div class="nav-section">Configure</div>
  <a class="nav {{ 'active' if active == 'channels' }}" href="/channels">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="m17 2-5 5-5-5"/></svg>
    <span class="label">Channels</span>
  </a>
  <a class="nav {{ 'active' if active == 'keywords' }}" href="/keywords">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9h16"/><path d="M4 15h16"/><path d="M10 3 8 21"/><path d="M16 3l-2 18"/></svg>
    <span class="label">Keywords</span>
  </a>
  <a class="nav {{ 'active' if active == 'traits' }}" href="/traits">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 2 7l10 5 10-5-10-5z"/><path d="m2 17 10 5 10-5"/><path d="m2 12 10 5 10-5"/></svg>
    <span class="label">Traits</span>
  </a>

  <button class="theme-toggle" type="button" onclick="toggleTheme()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
    <span class="label" id="theme-label">Light mode</span>
  </button>
  <div class="foot">Single-operator, local.<br>You approve every action.</div>
</aside>
<script>
  (function () {
    var cur = document.documentElement.getAttribute('data-theme');
    var lbl = document.getElementById('theme-label');
    if (lbl) lbl.textContent = cur === 'light' ? 'Dark mode' : 'Light mode';
  })();
</script>
<main>
  {% if msg %}<div class="msg">{{ msg }}</div>{% endif %}
  {% block content %}{% endblock %}
</main>
</body>
</html>
